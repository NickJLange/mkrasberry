# Test Pi-hole v6 API with Telegraf cookie authentication
[[inputs.http]]
  urls = ["http://192.168.100.23:1080/api/stats/summary"]
  
  # Pi-hole v6 authentication
  cookie_auth_url = "http://192.168.100.23:1080/api/auth"
  cookie_auth_method = "POST"
  cookie_auth_body = '{"password":"pihole123abc"}'
  
  name_override = "pihole_test"
  data_format = "json"
  timeout = "10s"
  interval = "30s"

[[outputs.file]]
  files = ["stdout"]
  data_format = "influx"
